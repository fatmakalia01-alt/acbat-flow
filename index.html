<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Consolidated Early Suppression & Connection Blocking -->
  <script>
    (function () {
      // 1. Block Lovable WebSocket connections immediately
      var OriginalWebSocket = window.WebSocket;
      window.WebSocket = function (url, protocols) {
        if (typeof url === 'string' && url.includes('lovableproject.com')) {
          var dummy = Object.create(OriginalWebSocket.prototype);
          Object.defineProperty(dummy, 'readyState', { get: function () { return 3; } }); // CLOSED
          Object.defineProperty(dummy, 'url', { get: function () { return url; } });
          dummy.send = function () { };
          dummy.close = function () { };
          dummy.addEventListener = function () { };
          dummy.removeEventListener = function () { };
          return dummy;
        }
        return protocols ? new OriginalWebSocket(url, protocols) : new OriginalWebSocket(url);
      };
      window.WebSocket.prototype = OriginalWebSocket.prototype;
      window.WebSocket.CONNECTING = 0; window.WebSocket.OPEN = 1; window.WebSocket.CLOSING = 2; window.WebSocket.CLOSED = 3;

      // 2. Early Console Suppression (Log, Warn, Info, Error, Debug)
      const suppressPatterns = [
        "Unrecognized feature",
        "allow-scripts and allow-same-origin",
        "RudderStack",
        "Initializing RudderStack",
        "We're hiring",
        "lovable.dev",
        "vr",
        "battery",
        "ambient-light-sensor",
        "third-party cookies",
        "osano",
        "sandbox attribute can escape"
      ];
      const suppress = (method) => {
        const original = console[method];
        console[method] = (...args) => {
          const combined = args.map(arg => {
            try {
              if (typeof arg === 'string') return arg;
              if (arg instanceof Error) return arg.message;
              return JSON.stringify(arg);
            } catch (e) {
              return String(arg);
            }
          }).join(" ").toLowerCase();
          if (suppressPatterns.some(p => combined.includes(p.toLowerCase()))) return;
          original.apply(console, args);
        };
      };
      ['log', 'warn', 'info', 'error', 'debug'].forEach(suppress);

      // 3. Early Lovable Element Removal Pattern
      const removeWatermark = () => {
        const selectors = ['#lovable-badge', '.lovable-badge', '[data-lovable-tag]', 'div[style*="z-index: 9999"]'];
        selectors.forEach(s => {
          document.querySelectorAll(s).forEach(el => {
            if (el.innerText?.toLowerCase().includes('lovable') || el.id === 'lovable-badge') el.remove();
          });
        });
      };
      const obs = new MutationObserver(removeWatermark);
      obs.observe(document.documentElement, { childList: true, subtree: true });
      window.addEventListener('DOMContentLoaded', removeWatermark);
    })();
  </script>
  <title>ACBAT Flow</title>
  <meta name="description" content="Application de gestion ACBAT Flow">
  <meta name="author" content="ACBAT" />
  <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials">
  <meta name="theme-color" content="#ffffff">
  <link rel="apple-touch-icon" href="/icon.jpeg">

  <meta property="og:type" content="website" />
  <meta property="og:title" content="ACBAT Flow">
  <meta property="og:description" content="Application de gestion ACBAT Flow">
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ACBAT Flow">
  <meta name="twitter:description" content="Application de gestion ACBAT Flow">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>

</html>
