<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Block Lovable WebSocket connections -->
  <script>
    (function () {
      var OriginalWebSocket = window.WebSocket;
      window.WebSocket = function (url, protocols) {
        if (typeof url === 'string' && url.includes('lovableproject.com')) {
          // Silently discard - return a dummy non-connecting socket
          var dummy = Object.create(OriginalWebSocket.prototype);
          Object.defineProperty(dummy, 'readyState', { get: function () { return 3; } }); // CLOSED
          Object.defineProperty(dummy, 'url', { get: function () { return url; } });
          dummy.send = function () { };
          dummy.close = function () { };
          dummy.addEventListener = function () { };
          dummy.removeEventListener = function () { };
          return dummy;
        }
        return protocols ? new OriginalWebSocket(url, protocols) : new OriginalWebSocket(url);
      };
      window.WebSocket.prototype = OriginalWebSocket.prototype;
      window.WebSocket.CONNECTING = 0;
      window.WebSocket.OPEN = 1;
      window.WebSocket.CLOSING = 2;
      window.WebSocket.CLOSED = 3;
    })();
  </script>
  <!-- TODO: Set the document title to the name of your application -->
  <title>ACBAT Flow</title>
  <meta name="description" content="Application de gestion ACBAT Flow">
  <meta name="author" content="ACBAT" />
  <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials">
  <meta name="theme-color" content="#ffffff">
  <link rel="apple-touch-icon" href="/icon.jpeg">

  <meta property="og:type" content="website" />
  <meta property="og:title" content="ACBAT Flow">
  <meta property="og:description" content="Application de gestion ACBAT Flow">
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ACBAT Flow">
  <meta name="twitter:description" content="Application de gestion ACBAT Flow">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Suppress unavoidable platform/sandboxing console warnings
    const originalWarn = console.warn;
    console.warn = (...args) => {
      const msg = args[0]?.toString() || "";
      if (
        msg.includes("Unrecognized feature") ||
        msg.includes("iframe which has both allow-scripts and allow-same-origin") ||
        msg.includes("RudderStack")
      ) {
        return;
      }
      originalWarn.apply(console, args);
    };

    // Aggressively remove Lovable watermark/badge
    const removeWatermark = () => {
      const selectors = [
        '#lovable-badge',
        '.lovable-badge',
        '[data-lovable-tag]',
        'div[style*="z-index: 9999"]',
        'div[style*="lovable"]'
      ];
      selectors.forEach(selector => {
        document.querySelectorAll(selector).forEach(el => {
          if (el.innerText?.toLowerCase().includes('lovable') || el.id === 'lovable-badge') {
            el.remove();
          }
        });
      });
    };

    // Use MutationObserver for late-injected elements
    const observer = new MutationObserver(removeWatermark);
    observer.observe(document.documentElement, { childList: true, subtree: true });

    // Initial cleanup
    window.addEventListener('DOMContentLoaded', removeWatermark);
    window.addEventListener('load', removeWatermark);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>

</html>
